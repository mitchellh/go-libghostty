# In-repo Buildkite pipeline. The Buildkite-side pipeline only needs
# one step that does `buildkite-agent pipeline upload`; everything
# real lives here.

# Shared retry policy. Building libghostty-vt invokes `zig build`,
# which fetches Zig package dependencies (e.g. freetype) over HTTPS
# from deps.files.ghostty.org. Those fetches occasionally fail with
# transient errors like `HttpConnectionClosing`. The
# `.buildkite/scripts/retry-on-zig-fetch` wrapper detects those
# specific failures in the command output and re-exits with 75
# (EX_TEMPFAIL); we retry only on that exit code so real build
# failures still fail fast.
_retry: &retry
  retry:
    automatic:
      - exit_status: 75
        limit: 2

steps:
  - label: ":go: fmt"
    # Mirror the original GitHub Actions check: `gofmt -l` lists files
    # that would be reformatted, so we fail the build if that list is
    # non-empty. Using `nix develop -c` ensures the same `go` toolchain
    # the rest of the pipeline uses.
    command: nix develop -c sh -c 'test -z "$(gofmt -l .)"'

  - label: ":go: test"
    <<: *retry
    # Build libghostty via cmake (`make build`) and then run the full
    # Go test suite. Both happen inside the flake's dev shell so the
    # toolchain (cmake, go, zig for cgo) matches local development.
    command: |
      .buildkite/scripts/retry-on-zig-fetch nix develop -c make build
      nix develop -c make test

  - label: ":package: build (shared)"
    <<: *retry
    # Default cgo build: dynamically links against libghostty-vt.
    # Confirms the standard build path still compiles end-to-end.
    command: |
      .buildkite/scripts/retry-on-zig-fetch nix develop -c make build
      nix develop -c go build ./...

  - label: ":package: build (static)"
    <<: *retry
    # `-tags static` swaps the cgo wiring to statically link
    # libghostty-vt. Verified separately because the linker flags and
    # symbol resolution differ from the shared build.
    command: |
      .buildkite/scripts/retry-on-zig-fetch nix develop -c make build
      nix develop -c go build -tags static ./...

  - label: ":go: example {{matrix}}"
    <<: *retry
    # One step per example program under examples/. Each example is a
    # standalone main package that exercises a slice of the bindings,
    # so running them all is the cheapest end-to-end smoke test we
    # have. Keep this list in sync with `ls examples/`.
    command: |
      .buildkite/scripts/retry-on-zig-fetch nix develop -c make build
      nix develop -c go run ./examples/{{matrix}}/
    matrix:
      - build-info
      - colors
      - effects
      - formatter
      - grid-traverse
      - modes
      - render

  - label: ":zig: cross {{matrix}}"
    <<: *retry
    # Cross-compile the package for each supported GOOS/GOARCH using
    # `zig cc` as the cgo compiler (see Makefile `cross-<target>`
    # rules). This catches platform-specific cgo and linker issues
    # without needing native runners for every target.
    command: .buildkite/scripts/retry-on-zig-fetch nix develop -c make cross-{{matrix}}
    matrix:
      - linux-amd64
      - linux-arm64
      - macos-amd64
      - macos-arm64
      - windows-amd64
      - windows-arm64

  # Block the mirror step until every build/test step above has
  # passed. We never want to publish a broken main to the public
  # GitHub mirror.
  - wait

  - label: ":github: mirror to github"
    # Only mirror from main; feature branches and PRs should not
    # republish themselves to the public mirror.
    branches: "main"
    # Serialize mirror pushes across builds. Without this, two main
    # builds finishing close together could race and produce
    # non-fast-forward push churn (or worse, lose a ref).
    concurrency: 1
    concurrency_group: "go-libghostty/github-mirror"
    # Reads the GITHUB_MIRROR_SSH_KEY cluster secret, fetches all
    # branches/tags from origin, and force-pushes them (with --prune)
    # to github.com/mitchellh/go-libghostty.
    command: .buildkite/scripts/mirror-to-github
